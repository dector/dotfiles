# Prefix: Ctrl-a instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Better numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Splits open in current pane directory
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Vim-style movement + copy mode
setw -g mode-keys vi
set -g status-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Clipboard integration (Wayland)
set -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Small behavior tweaks
set -g focus-events on
bind Tab last-window

# QoL: fast input + long history
set -g escape-time 0
set -g history-limit 100000

# QoL: better color support (truecolor)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

# QoL: minimal status bar
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=colour250"
set -g status-left "#[bold] #S "
set -g status-right "#[fg=colour244]%Y-%m-%d %H:%M "

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
